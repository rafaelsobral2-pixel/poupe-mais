<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poupe+ | Criar conta</title>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Tailwind CSS pré-compilado (funciona offline) -->
    <link rel="stylesheet" href="tailwind.css">

    <!-- CSS personalizado em arquivo separado -->
    <link rel="stylesheet" href="styles.css">
</head>

<body class="font-sans bg-slate-50 min-h-screen">

    <main class="min-h-screen flex flex-col lg:flex-row">

        <!-- ===================== PAINEL ESQUERDO (BRANDING) ===================== -->
        <aside class="brand-panel relative overflow-hidden
                      w-full lg:w-1/2
                      px-6 py-10 sm:px-10 lg:px-16 lg:py-16
                      flex flex-col justify-center items-center
                      text-white">

            <!-- Decoração de fundo sutil -->
            <div class="brand-decor" aria-hidden="true"></div>

            <div class="relative z-10 w-full max-w-md text-center lg:text-left">

                <!-- Logo -->
                <h1 class="text-4xl sm:text-5xl font-extrabold tracking-tight">
                    Poupe<span class="text-brand-accent">+</span>
                </h1>

                <p class="mt-3 text-base sm:text-lg text-white/85 leading-relaxed">
                    Controle suas finanças de forma inteligente
                    e economize mais todo mês.
                </p>

                <!-- Cards de funcionalidades -->
                <ul class="mt-8 sm:mt-10 space-y-3 sm:space-y-4">

                    <li class="feature-card">
                        <span class="feature-icon bg-sky-500/25">
                            <!-- ícone gráfico -->
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                                 fill="none" stroke="currentColor" stroke-width="2.2"
                                 stroke-linecap="round" stroke-linejoin="round"
                                 class="w-5 h-5 text-sky-300">
                                <path d="M3 3v18h18"/>
                                <rect x="7"  y="12" width="3" height="6"/>
                                <rect x="12" y="8"  width="3" height="10"/>
                                <rect x="17" y="5"  width="3" height="13"/>
                            </svg>
                        </span>
                        <span class="text-sm sm:text-base font-medium">Controle de gastos mensais</span>
                    </li>

                    <li class="feature-card">
                        <span class="feature-icon bg-red-500/25">
                            <!-- ícone alvo -->
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                                 fill="none" stroke="currentColor" stroke-width="2.2"
                                 stroke-linecap="round" stroke-linejoin="round"
                                 class="w-5 h-5 text-red-300">
                                <circle cx="12" cy="12" r="9"/>
                                <circle cx="12" cy="12" r="5"/>
                                <circle cx="12" cy="12" r="1.5" fill="currentColor"/>
                            </svg>
                        </span>
                        <span class="text-sm sm:text-base font-medium">Metas financeiras</span>
                    </li>

                    <li class="feature-card">
                        <span class="feature-icon bg-amber-400/25">
                            <!-- ícone cadeado -->
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                                 fill="none" stroke="currentColor" stroke-width="2.2"
                                 stroke-linecap="round" stroke-linejoin="round"
                                 class="w-5 h-5 text-amber-300">
                                <rect x="4" y="11" width="16" height="10" rx="2"/>
                                <path d="M8 11V8a4 4 0 1 1 8 0v3"/>
                            </svg>
                        </span>
                        <span class="text-sm sm:text-base font-medium">Dados seguros e criptografados</span>
                    </li>

                </ul>
            </div>
        </aside>

        <!-- ===================== PAINEL DIREITO (FORMULÁRIO) ===================== -->
        <section class="w-full lg:w-1/2
                        flex justify-center items-center
                        px-6 py-10 sm:px-10 lg:px-16">

            <div class="w-full max-w-md">

                <header class="mb-6">
                    <h2 class="text-2xl sm:text-3xl font-bold text-slate-900">Criar conta</h2>
                    <p class="mt-1 text-sm sm:text-base text-slate-500">
                        Preencha os dados abaixo para se cadastrar
                    </p>
                </header>

                <!-- Formulário (sem JS — apenas estrutura visual) -->
                <form class="space-y-5" action="#" method="post" novalidate>

                    <!-- Linha: nome + sobrenome -->
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label for="nome" class="form-label">NOME</label>
                            <input id="nome" name="nome" type="text"
                                   value="Ana Beatriz"
                                   class="form-input form-input--focused">
                        </div>
                        <div>
                            <label for="sobrenome" class="form-label">SOBRENOME</label>
                            <input id="sobrenome" name="sobrenome" type="text"
                                   placeholder="Silva"
                                   class="form-input">
                        </div>
                    </div>

                    <!-- E-mail -->
                    <div>
                        <label for="email" class="form-label">E-MAIL</label>
                        <input id="email" name="email" type="email"
                               placeholder="ana@email.com"
                               class="form-input">
                    </div>

                    <!-- Linha: senha + confirmar senha -->
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label for="senha" class="form-label">SENHA</label>
                            <input id="senha" name="senha" type="password"
                                   value="12345678"
                                   class="form-input">
                        </div>
                        <div>
                            <label for="confirmar" class="form-label">CONFIRMAR SENHA</label>
                            <input id="confirmar" name="confirmar" type="password"
                                   value="1234567"
                                   class="form-input form-input--error"
                                   aria-describedby="erro-senha">
                        </div>
                    </div>

                    <!-- Mensagem de erro -->
                    <p id="erro-senha" class="-mt-3 text-sm text-red-600 flex items-center gap-1">
                        <span aria-hidden="true">⚠</span>
                        As senhas não coincidem
                    </p>

                    <!-- Termos -->
                    <label class="flex items-start gap-2 text-sm text-slate-700 cursor-pointer select-none">
                        <input type="checkbox" checked
                               class="custom-checkbox mt-0.5">
                        <span>
                            Aceito os
                            <a href="#" class="text-brand font-medium hover:underline">Termos de Uso</a>
                            e a
                            <a href="#" class="text-brand font-medium hover:underline">Política de Privacidade</a>
                        </span>
                    </label>

                    <!-- Botão principal -->
                    <button type="submit"
                            class="w-full bg-brand hover:bg-brand-dark
                                   text-white font-semibold
                                   py-3 rounded-lg
                                   transition-colors duration-200
                                   shadow-sm hover:shadow-md
                                   focus:outline-none focus:ring-2 focus:ring-brand focus:ring-offset-2">
                        Criar conta
                    </button>

                    <!-- Link para login -->
                    <p class="text-center text-sm text-slate-500">
                        Já tem conta?
                        <a href="#" class="text-brand font-semibold hover:underline">Fazer login</a>
                    </p>
                </form>
            </div>
        </section>
    </main>

</body>
</html>
